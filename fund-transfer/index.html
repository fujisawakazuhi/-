<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資金移動業関係</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2244%22 fill=%22%230f6660%22/%3E%3Cpath d=%22M32 42 h36 M32 58 h36 M60 30 L44 70%22 stroke=%22%23fff%22 stroke-width=%227%22 stroke-linecap=%22round%22/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#eef1f2; --ink:#17222c; --ink-soft:#63707b;
    --card:#fff; --line:#e2e7e9;
    --teal:#0f6660; --teal-2:#17a294; --teal-soft:#e2f1ef;
    --shadow:0 1px 2px rgba(15,40,38,.05),0 18px 44px -20px rgba(15,60,55,.25);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",Meiryo,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;
    min-height:100vh;display:flex;flex-direction:column;
  }
  .wrap{max-width:1020px;margin:0 auto;padding:0 22px;width:100%}

  .hero{
    background:linear-gradient(135deg,#0b2f2c 0%,#0f4c47 55%,#15655d 100%);
    color:#fff;padding:40px 0 84px;position:relative;overflow:hidden;
  }
  .hero::before{
    content:"";position:absolute;width:420px;height:420px;border-radius:50%;
    right:-130px;top:-180px;pointer-events:none;
    background:radial-gradient(circle,rgba(255,255,255,.13),transparent 65%);
  }
  .hero .wrap{position:relative}
  .back{
    display:inline-block;font-size:.8rem;font-weight:600;text-decoration:none;
    color:rgba(255,255,255,.75);margin-bottom:14px;
  }
  .back:hover{color:#fff}
  .hero h1{font-size:clamp(1.7rem,4vw,2.3rem);font-weight:800;letter-spacing:.04em;line-height:1.2}
  .hero p{margin-top:10px;font-size:.92rem;color:rgba(255,255,255,.78);max-width:560px}

  main{flex:1;padding-bottom:60px}
  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;
    margin-top:-48px;position:relative;z-index:1;
  }
  .sec{
    display:flex;flex-direction:column;gap:12px;
    background:var(--card);border:1px solid var(--line);border-radius:22px;
    padding:26px 24px 22px;text-decoration:none;color:inherit;
    box-shadow:var(--shadow);
    transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
  }
  a.sec:hover{
    transform:translateY(-4px);border-color:#bcd4d0;
    box-shadow:0 2px 4px rgba(15,40,38,.06),0 26px 56px -22px rgba(15,80,72,.35);
  }
  .emoji{
    width:54px;height:54px;border-radius:16px;background:var(--teal-soft);
    display:flex;align-items:center;justify-content:center;font-size:1.5rem;
  }
  .sec h2{font-size:1.1rem;font-weight:800;letter-spacing:.02em}
  .sec p{font-size:.84rem;color:var(--ink-soft);flex:1}
  .foot{
    display:flex;align-items:center;justify-content:space-between;
    border-top:1px solid var(--line);padding-top:14px;margin-top:2px;
  }
  .badge{font-size:.72rem;font-weight:700;border-radius:999px;padding:4px 12px}
  .badge.live{color:var(--teal);background:var(--teal-soft)}
  .badge.soon{color:#8a949c;background:#eceff0}
  .go{
    font-size:.85rem;font-weight:700;color:#fff;border-radius:999px;padding:8px 20px;
    background:linear-gradient(135deg,var(--teal-2),var(--teal));
    box-shadow:0 8px 20px -8px rgba(15,102,96,.55);
  }
  .sec.soon-card{opacity:.75}
  .sec.soon-card .go{background:#c7cfd2;box-shadow:none}

  footer{border-top:1px solid var(--line);padding:18px 0 26px;font-size:.74rem;color:var(--ink-soft)}
</style>
</head>
<body>

<div class="hero">
  <div class="wrap">
    <a class="back" href="../">← ポータルにもどる</a>
    <h1>💸 資金移動業関係</h1>
    <p>資金移動業・資金決済まわりの情報をここにまとめています。</p>
  </div>
</div>

<main>
  <div class="wrap">
    <div class="grid">

      <a class="sec" href="./daily-news/">
        <div class="emoji">📰</div>
        <h2>デイリーニュース</h2>
        <p>資金決済法・犯収法の改正動向、金融庁の公表資料、業界ニュース、海外送金・ステーブルコイン等の周辺動向を1日1ポストで記録。</p>
        <div class="foot">
          <span class="badge live">運用中</span>
          <span class="go">開く →</span>
        </div>
      </a>

      <div class="sec soon-card">
        <div class="emoji">📚</div>
        <h2>法令・制度メモ</h2>
        <p>資金決済法・関連ガイドラインの体系的な整理（予定）。</p>
        <div class="foot">
          <span class="badge soon">準備中</span>
          <span class="go">—</span>
        </div>
      </div>

      <div class="sec soon-card">
        <div class="emoji">🔗</div>
        <h2>資料・リンク集</h2>
        <p>官庁・業界団体・統計など、よく参照する一次情報へのリンク集（予定）。</p>
        <div class="foot">
          <span class="badge soon">準備中</span>
          <span class="go">—</span>
        </div>
      </div>

    </div>
  </div>
</main>

<footer>
  <div class="wrap">個人的なメモです。正確な内容は必ず原典をご確認ください。</div>
</footer>

</body>
</html>
