<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="資金移動業者登録一覧の変更履歴アーカイブ。新規登録・登録抹消の検知結果をウォッチ開始以降すべて時系列で蓄積。">
<title>変更履歴アーカイブ | 資金移動業者 登録一覧ウォッチャー</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22 shape-rendering=%22crispEdges%22%3E%3Cg fill=%22%233a3352%22%3E%3Crect x=%222%22 y=%222%22 width=%2212%22 height=%2212%22/%3E%3C/g%3E%3Cg fill=%22%23fdfcf8%22%3E%3Crect x=%223%22 y=%223%22 width=%2210%22 height=%2210%22/%3E%3C/g%3E%3Cg fill=%22%233a3352%22%3E%3Crect x=%224%22 y=%225%22 width=%226%22 height=%221%22/%3E%3Crect x=%224%22 y=%228%22 width=%226%22 height=%221%22/%3E%3Crect x=%224%22 y=%2211%22 width=%224%22 height=%221%22/%3E%3C/g%3E%3Cg fill=%22%23ffd94a%22%3E%3Crect x=%2211%22 y=%224%22 width=%222%22 height=%225%22/%3E%3C/g%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../../assets/sakura.css">
<style>
  :root{
    --ink-soft:#6d6685; --line:#3a3352;
    --accent:#e0679d; --accent-soft:#fbe3ef;
    --addbg:#e7f6e3; --addln:#3f9a50; --rembg:#ffebe9; --remln:#cf222e;
    color-scheme:light;
  }
  body{padding-bottom:60px}
  .page-head{background:transparent}
  .page-head .inner{max-width:860px;margin:0 auto;padding:22px 20px}
  .page-head h1{font-family:var(--dot);font-size:24px;font-weight:400;letter-spacing:1px;line-height:1.3;color:var(--ink);text-shadow:2px 2px 0 var(--accent-soft)}
  .page-head .desc{color:var(--ink-soft);font-size:14px;margin-top:6px}

  main.wrap{max-width:860px;padding-top:0}
  .tool-card{background:rgba(255,255,255,.95);border:3px solid var(--ink);box-shadow:var(--hard);padding:20px;margin-top:20px}
  .updated{font-family:var(--dot);font-size:13px;letter-spacing:1px;color:var(--ink);background:var(--accent-soft);border:2px solid var(--ink);display:inline-block;padding:4px 12px;margin-bottom:6px}

  .chg{border:2px solid var(--line);margin-top:12px}
  .chg .d{font-family:var(--dot);font-size:13px;letter-spacing:1px;padding:6px 12px;border-bottom:2px solid var(--line);background:var(--accent-soft)}
  .chg ul{list-style:none;padding:8px 12px}
  .chg li{font-size:.88rem;line-height:1.7;padding:6px 10px;margin:6px 0;border:2px solid}
  .chg li.add{background:var(--addbg);border-color:var(--addln)}
  .chg li.add .tag{color:var(--addln)}
  .chg li.rem{background:var(--rembg);border-color:var(--remln)}
  .chg li.rem .tag{color:var(--remln)}
  .chg li .tag{font-weight:700;margin-right:6px}
  .chg li .sub{display:block;font-size:.78rem;color:var(--ink-soft)}
  .nochg{font-size:.9rem;color:var(--ink-soft);padding:12px 4px;line-height:1.9}
  .note{font-size:.78rem;color:var(--ink-soft);line-height:1.9;margin-top:14px}
  .note a{color:var(--pink-deep)}
  .loading{padding:24px;text-align:center;color:var(--ink-soft);font-family:var(--dot);letter-spacing:1px}
</style>
</head>
<body>

<div class="bar">
  <a class="logo" href="../../../">✿</a>
  <a class="brand" href="../../../">PORTAL</a>
  <span class="crumb">/ <a href="../../">資金移動業関係</a> / <a href="../">登録一覧ウォッチャー</a> / <span class="cur">変更履歴</span></span>
  <span class="lv">LV.1</span>
</div>

<div class="page-head">
  <div class="inner">
    <h1>📜 変更履歴アーカイブ</h1>
    <p class="desc">資金移動業者登録一覧の新規登録・登録抹消を、ウォッチ開始（2026年7月）以降すべて時系列で蓄積しています。</p>
  </div>
</div>

<main class="wrap">

  <section class="tool-card">
    <span class="updated" id="updated">読み込み中…</span>
    <div id="chgArea"><div class="loading">LOADING...</div></div>
    <p class="note">
      出典：<a href="https://www.fsa.go.jp/menkyo/menkyo.html" target="_blank" rel="noopener">金融庁「免許・許可・登録等を受けている業者一覧」</a>の資金移動業者一覧を毎営業日チェック。
      正確な情報は必ず金融庁の原典をご確認ください。
    </p>
  </section>

</main>

<footer class="foot">
  <div class="inner">
    <span>個人的なウォッチページです。正確な内容は金融庁の公表資料をご確認ください。</span>
    <a href="../">← 登録一覧ウォッチャー</a>
  </div>
</footer>

<script>
(function(){
"use strict";
var $=function(id){return document.getElementById(id)};
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]})}

var ERA={"令和":2018,"平成":1988,"昭和":1925};
function isoDate(v){
  v=String(v||"").trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(v))return v;
  var m=v.match(/^(令和|平成|昭和)(元|\d+)年(\d+)月(\d+)日$/);
  if(m){
    var y=ERA[m[1]]+(m[2]==="元"?1:+m[2]);
    return y+"-"+("0"+m[3]).slice(-2)+"-"+("0"+m[4]).slice(-2);
  }
  if(/^\d{5}$/.test(v)&&+v>=20000&&+v<=60000){
    var d=new Date(Date.UTC(1899,11,30)+ +v*86400000);
    return d.toISOString().slice(0,10);
  }
  return v;
}

function opLine(op,tag){
  var name="",no="",kan="",dt="";
  Object.keys(op).forEach(function(k){
    if(!name&&(k.indexOf("業者名")>=0||k.indexOf("名称")>=0||k.indexOf("商号")>=0))name=op[k];
    if(!no&&k.indexOf("登録番号")>=0)no=op[k];
    if(!kan&&k.indexOf("所管")>=0)kan=op[k];
    if(!dt&&k.indexOf("年月日")>=0)dt=isoDate(op[k]);
  });
  var sub=[no,kan,dt&&("登録日 "+dt)].filter(Boolean).join("　");
  return '<span class="tag">'+tag+'</span>'+esc(name||no||"（名称不明）")
    +(sub?'<span class="sub">'+esc(sub)+"</span>":"");
}

fetch("../changes.json?ts="+Date.now(),{cache:"no-store"})
  .then(function(r){return r.json()})
  .then(function(chs){
    var area=$("chgArea"); area.innerHTML="";
    var days=(chs||[]).length;
    var n=0;
    (chs||[]).forEach(function(ch){n+=(ch.added||[]).length+(ch.removed||[]).length});
    $("updated").textContent="記録: "+days+" 日分・"+n+" 件";
    if(!chs.length){
      area.innerHTML='<div class="nochg">ウォッチ開始以降、変更はまだ検知されていません。（毎営業日チェック中。新規登録・登録抹消があった日だけ、ここに記録が増えていきます）</div>';
      return;
    }
    chs.forEach(function(ch){
      var div=document.createElement("div"); div.className="chg";
      var lis="";
      (ch.added||[]).forEach(function(op){ lis+='<li class="add">'+opLine(op,"＋ 新規登録")+"</li>"; });
      (ch.removed||[]).forEach(function(op){ lis+='<li class="rem">'+opLine(op,"－ 登録抹消")+"</li>"; });
      div.innerHTML='<div class="d">'+esc(ch.date)+"</div><ul>"+lis+"</ul>";
      area.appendChild(div);
    });
  })
  .catch(function(){ $("chgArea").innerHTML='<div class="nochg">データ未取得（初回実行前）</div>'; });
})();
</script>
<script src="../../../assets/scene.js" defer></script>
</body>
</html>
