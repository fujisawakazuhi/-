name: Fetch FSA data

on:
  schedule:
    # 平日 朝・昼・夕方の3回（JST 09:37 / 12:07 / 17:07）
    # GitHubのcronは混雑時に数時間遅れることがある
    - cron: '37 0 * * 1-5'
    - cron: '7 3 * * 1-5'
    - cron: '7 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: pip install --quiet openpyxl pypdf

      - name: Fetch FSA data
        run: python3 scripts/fetch_fsa.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fund-transfer/registry fund-transfer/shobun
          if git diff --cached --quiet; then
            echo "No change"
          else
            git commit -m "Update FSA data (registry / shobun)"
            for i in 1 2 3; do
              git push && break
              git pull --rebase origin main
            done
          fi
