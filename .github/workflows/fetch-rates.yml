name: Fetch bank FX rates

on:
  schedule:
    # JST 10:23 / 10:53 / 12:23 / 14:23 / 15:23 / 16:53（平日）
    # TTS/TTBは毎営業日10時頃公表。GitHubのcronは数時間遅延することが
    # あるため多めに設定（変更がなければコミットされない）
    - cron: '23 1 * * 1-5'
    - cron: '53 1 * * 1-5'
    - cron: '23 3 * * 1-5'
    - cron: '23 5 * * 1-5'
    - cron: '23 6 * * 1-5'
    - cron: '53 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-${{ runner.os }}

      - name: Install Playwright
        run: |
          pip install --quiet playwright pypdf
          python3 -m playwright install --with-deps chromium

      - name: Fetch rates
        run: python3 scripts/fetch_rates.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/bankrate/rates.json
          if git diff --cached --quiet; then
            echo "No change"
          else
            git commit -m "Update bank FX rates"
            for i in 1 2 3; do
              git push && break
              git pull --rebase origin main
            done
          fi
