name: Fetch bank FX rates

on:
  schedule:
    # JST 10:15 / 12:05 / 15:05（平日）— TTS/TTBは毎営業日10時頃公表
    - cron: '15 1 * * 1-5'
    - cron: '5 3 * * 1-5'
    - cron: '5 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch rates
        run: python3 scripts/fetch_rates.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/bankrate/rates.json
          if git diff --cached --quiet; then
            echo "No change"
          else
            git commit -m "Update bank FX rates"
            git push
          fi
