<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22%3E%3Crect x=%222%22 y=%222%22 width=%2228%22 height=%2228%22 rx=%228%22 fill=%22%2324292f%22/%3E%3Cpath d=%22M10 12 l5 4 -5 4 M17 20 h5%22 stroke=%22%23fff%22 stroke-width=%222.4%22 fill=%22none%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22/%3E%3C/svg%3E">
<link rel="stylesheet" href="assets/site.css">
</head>
<body>

<header class="gh-header">
  <div class="inner">
    <a class="gh-brand" href="./">
      <svg class="gh-mark" viewBox="0 0 32 32" aria-hidden="true"><rect x="2" y="2" width="28" height="28" rx="8" fill="#fff"/><path d="M10 12 l5 4 -5 4 M17 20 h5" stroke="#24292f" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Portal
    </a>
  </div>
</header>

<div class="page-head">
  <div class="inner">
    <h1>マイポータル</h1>
    <p class="desc">日記・調査記録・業務ツールなど、自分に関係するものの入口をまとめています。</p>
  </div>
</div>

<main class="container">
  <div class="card-grid">

    <a class="card" href="./tools/">
      <div class="card-top">
        <span class="card-icon">🧰</span>
        <span class="card-title">ツール集</span>
      </div>
      <p class="card-desc">ブラウザだけで完結する業務支援ツール。秘密度一括チェック、JPY為替レート確認・換算、SWIFT/BIC照会。</p>
      <div class="card-foot">
        <span class="Label Label--success">● 公開中</span>
        <span class="muted">3 tools</span>
      </div>
    </a>

    <a class="card" href="./fund-transfer/">
      <div class="card-top">
        <span class="card-icon">💸</span>
        <span class="card-title">資金移動業関係</span>
      </div>
      <p class="card-desc">デイリーニュース（1日1ポスト）など、資金移動業・資金決済まわりの情報のまとめ。</p>
      <div class="card-foot">
        <span class="Label Label--success">● 公開中</span>
        <span class="muted">daily news</span>
      </div>
    </a>

    <a class="card" href="./diary/">
      <div class="card-top">
        <span class="card-icon">📓</span>
        <span class="card-title">日記</span>
      </div>
      <p class="card-desc">日々の記録。</p>
      <div class="card-foot">
        <span class="Label Label--muted">準備中</span>
      </div>
    </a>

    <a class="card" href="./law/">
      <div class="card-top">
        <span class="card-icon">⚖️</span>
        <span class="card-title">法令調査結果</span>
      </div>
      <p class="card-desc">法令・規制まわりの調査メモと結果のまとめ。</p>
      <div class="card-foot">
        <span class="Label Label--muted">準備中</span>
      </div>
    </a>

  </div>
</main>

<footer class="site-footer">
  <div class="inner">
    <span>個人用ポータル</span>
    <span class="subtle">Built with Primer-style design</span>
  </div>
</footer>

</body>
</html>
