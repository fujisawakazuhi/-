<div class="bar">
  <a class="logo" href="./">✿</a>
  <a class="brand" href="./">PORTAL</a>
  <span class="lv">LV.1</span>
</div>

<main class="wrap">
  <h1 class="page-title">マイポータル</h1>
  <p class="sub">日記・調査記録・業務ツールなど、自分に関係するものの入口をまとめています。</p>

  <div class="grid">

    <a class="card" href="./tools/">
      <div class="top"><span class="ico">🧰</span><h2>ツール集</h2></div>
      <p>秘密度チェック、JPY為替レート、SWIFT/BIC照会。ブラウザだけで完結する業務支援ツール。</p>
      <span class="badge">▶ OPEN ·3</span>
    </a>

    <a class="card" href="./fund-transfer/">
      <div class="top"><span class="ico">💸</span><h2>資金移動業関係</h2></div>
      <p>デイリーニュース（1日1ポスト）など、資金移動業・資金決済まわりの情報のまとめ。</p>
      <span class="badge">▶ OPEN</span>
    </a>

    <a class="card" href="./diary/">
      <div class="top"><span class="ico">📓</span><h2>日記</h2></div>
      <p>日々の記録。</p>
      <span class="badge wip">🔒 LOCKED</span>
    </a>

    <a class="card" href="./law/">
      <div class="top"><span class="ico">⚖️</span><h2>法令調査結果</h2></div>
      <p>法令・規制まわりの調査メモと結果のまとめ。</p>
      <span class="badge wip">🔒 LOCKED</span>
    </a>

  </div>

  <div class="inner"><span>個人用ポータル</span></div>
