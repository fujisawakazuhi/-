<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイポータル</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Cpath d=%22M50 8 L92 42 V88 a4 4 0 0 1 -4 4 H62 V64 H38 V92 H12 a4 4 0 0 1 -4-4 V42 Z%22 fill=%22%230f6660%22/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#eef1f2; --ink:#17222c; --ink-soft:#63707b;
    --card:#fff; --line:#e2e7e9;
    --teal:#0f6660; --teal-2:#17a294; --teal-soft:#e2f1ef;
    --shadow:0 1px 2px rgba(15,40,38,.05),0 18px 44px -20px rgba(15,60,55,.25);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",Meiryo,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;
    min-height:100vh;display:flex;flex-direction:column;
  }
  .wrap{max-width:1020px;margin:0 auto;padding:0 22px;width:100%}

  .hero{
    background:linear-gradient(135deg,#0b2f2c 0%,#0f4c47 55%,#15655d 100%);
    color:#fff;padding:66px 0 100px;position:relative;overflow:hidden;
  }
  .hero::before,.hero::after{content:"";position:absolute;border-radius:50%;pointer-events:none}
  .hero::before{
    width:460px;height:460px;right:-140px;top:-180px;
    background:radial-gradient(circle,rgba(255,255,255,.14),transparent 65%);
  }
  .hero::after{
    width:340px;height:340px;left:-120px;bottom:-200px;
    background:radial-gradient(circle,rgba(23,162,148,.35),transparent 65%);
  }
  .eyebrow{
    display:inline-block;font-size:.72rem;font-weight:700;letter-spacing:.28em;
    color:rgba(255,255,255,.66);text-transform:uppercase;margin-bottom:14px;
  }
  .hero h1{font-size:clamp(2.1rem,5vw,2.9rem);font-weight:800;letter-spacing:.04em;line-height:1.15}
  .hero p{margin-top:12px;font-size:.95rem;color:rgba(255,255,255,.78);max-width:560px}

  main{flex:1;padding-bottom:64px}
  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;
    margin-top:-56px;position:relative;z-index:1;
  }
  .sec{
    display:flex;flex-direction:column;gap:12px;
    background:var(--card);border:1px solid var(--line);border-radius:22px;
    padding:26px 24px 22px;text-decoration:none;color:inherit;
    box-shadow:var(--shadow);
    transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
    animation:fadeUp .5s ease both;
  }
  .sec:nth-child(2){animation-delay:.07s}
  .sec:nth-child(3){animation-delay:.14s}
  .sec:nth-child(4){animation-delay:.21s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.sec{animation:none}}
  .sec:hover{
    transform:translateY(-4px);border-color:#bcd4d0;
    box-shadow:0 2px 4px rgba(15,40,38,.06),0 26px 56px -22px rgba(15,80,72,.35);
  }
  .sec .emoji{
    width:54px;height:54px;border-radius:16px;background:var(--teal-soft);
    display:flex;align-items:center;justify-content:center;font-size:1.6rem;
  }
  .sec h2{font-size:1.12rem;font-weight:800;letter-spacing:.02em}
  .sec p{font-size:.84rem;color:var(--ink-soft);flex:1}
  .sec .foot{
    display:flex;align-items:center;justify-content:space-between;
    border-top:1px solid var(--line);padding-top:14px;margin-top:2px;
  }
  .badge{
    font-size:.72rem;font-weight:700;border-radius:999px;padding:4px 12px;
  }
  .badge.live{color:var(--teal);background:var(--teal-soft)}
  .badge.soon{color:#8a949c;background:#eceff0}
  .go{
    font-size:.85rem;font-weight:700;color:#fff;border-radius:999px;padding:8px 20px;
    background:linear-gradient(135deg,var(--teal-2),var(--teal));
    box-shadow:0 8px 20px -8px rgba(15,102,96,.55);
    transition:transform .15s ease;
  }
  .sec:hover .go{transform:translateY(-1px)}

  footer{border-top:1px solid var(--line);padding:20px 0 28px;font-size:.76rem;color:var(--ink-soft)}
</style>
</head>
<body>

<div class="hero">
  <div class="wrap">
    <span class="eyebrow">Personal Hub</span>
    <h1>マイポータル</h1>
    <p>日記・調査記録・業務ツールなど、自分に関係するものの入口をここにまとめています。</p>
  </div>
</div>

<main>
  <div class="wrap">
    <div class="grid">

      <a class="sec" href="./tools/">
        <div class="emoji">🧰</div>
        <h2>ツール集</h2>
        <p>ブラウザだけで完結する業務支援ツール。秘密度一括チェック、JPY為替レート確認・換算など。</p>
        <div class="foot">
          <span class="badge live">公開中・2ツール</span>
          <span class="go">開く →</span>
        </div>
      </a>

      <a class="sec" href="./diary/">
        <div class="emoji">📓</div>
        <h2>日記</h2>
        <p>日々の記録。</p>
        <div class="foot">
          <span class="badge soon">準備中</span>
          <span class="go">開く →</span>
        </div>
      </a>

      <a class="sec" href="./law/">
        <div class="emoji">⚖️</div>
        <h2>法令調査結果</h2>
        <p>法令・規制まわりの調査メモと結果のまとめ。</p>
        <div class="foot">
          <span class="badge soon">準備中</span>
          <span class="go">開く →</span>
        </div>
      </a>

      <a class="sec" href="./fund-transfer/">
        <div class="emoji">💸</div>
        <h2>資金移動業関係</h2>
        <p>デイリーニュース（1日1ポスト）など、資金移動業に関する情報のまとめ。</p>
        <div class="foot">
          <span class="badge live">公開中</span>
          <span class="go">開く →</span>
        </div>
      </a>

    </div>
  </div>
</main>

<footer>
  <div class="wrap">個人用ポータル</div>
</footer>

</body>
</html>
