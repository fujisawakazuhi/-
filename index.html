<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ツール集</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect x=%2210%22 y=%2230%22 width=%2280%22 height=%2255%22 rx=%2210%22 fill=%22%2316635f%22/%3E%3Cpath d=%22M35 30 V22 a8 8 0 0 1 8-8 h14 a8 8 0 0 1 8 8 v8%22 fill=%22none%22 stroke=%22%2316635f%22 stroke-width=%229%22/%3E%3Ccircle cx=%2250%22 cy=%2257%22 r=%2210%22 fill=%22%23fff%22/%3E%3C/svg%3E">
<style>
  :root{
    --ink:#1c2530; --ink-soft:#66707a;
    --paper:#f5f6f7; --card:#fff; --line:#e2e5e8;
    --teal:#16635f; --teal-soft:#e4f0ef;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",Meiryo,sans-serif;
    background:var(--paper);color:var(--ink);line-height:1.6;
    min-height:100vh;display:flex;flex-direction:column;
  }
  .wrap{max-width:980px;margin:0 auto;padding:0 22px;width:100%}

  header{background:var(--card);border-bottom:1px solid var(--line);padding:38px 0 32px}
  h1{font-size:2rem;font-weight:800;letter-spacing:.04em;line-height:1.2}
  h1 small{display:block;font-size:.82rem;font-weight:500;color:var(--ink-soft);letter-spacing:.1em;margin-top:6px}

  main{flex:1;padding:34px 0 60px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px}

  .tool{
    display:flex;flex-direction:column;gap:14px;
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:26px 24px 22px;text-decoration:none;color:inherit;
    transition:box-shadow .15s,transform .15s,border-color .15s;
  }
  .tool:hover{border-color:#b9c6c4;box-shadow:0 6px 18px rgba(28,37,48,.08);transform:translateY(-2px)}
  .tool .icon{width:46px;height:46px}
  .tool h2{font-size:1.12rem;font-weight:800;letter-spacing:.02em}
  .tool p{font-size:.86rem;color:var(--ink-soft);flex:1}
  .tags{display:flex;flex-wrap:wrap;gap:6px}
  .tag{
    font-size:.7rem;font-weight:600;color:var(--teal);
    background:var(--teal-soft);border-radius:999px;padding:3px 10px;
  }
  .open{
    align-self:flex-start;font-size:.86rem;font-weight:700;color:#fff;
    background:var(--ink);border-radius:8px;padding:9px 22px;
  }
  .tool:hover .open{background:#2c3845}

  .tool.soon{
    border-style:dashed;background:transparent;cursor:default;
    align-items:center;justify-content:center;text-align:center;color:var(--ink-soft);
    min-height:230px;
  }
  .tool.soon:hover{box-shadow:none;transform:none;border-color:var(--line)}
  .tool.soon .plus{font-size:2rem;line-height:1;color:#c2c8cd}
  .tool.soon span{font-size:.84rem}

  footer{border-top:1px solid var(--line);padding:18px 0 26px;font-size:.76rem;color:var(--ink-soft)}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <h1>ツール集<small>ブラウザだけで完結する業務支援ツール</small></h1>
  </div>
</header>

<main>
  <div class="wrap">
    <div class="grid">

      <a class="tool" href="./check/">
        <svg class="icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 4 L90 18 V52 C90 76 72 90 50 97 C28 90 10 76 10 52 V18 Z" fill="#16635f"/>
          <path d="M30 50 L44 64 L72 35" fill="none" stroke="#fff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h2>秘密度一括チェック</h2>
        <p>Word / Excel / PowerPoint / PDF / ZIP をまとめてドラッグ＆ドロップするだけで、Microsoft Purview の秘密度ラベル（レベル2・レベル3）が付いたファイルを一括で検出します。ファイルの外部連携前の確認に。</p>
        <div class="tags">
          <span class="tag">完全ローカル処理</span>
          <span class="tag">最大500ファイル</span>
          <span class="tag">ZIP内も自動チェック</span>
        </div>
        <span class="open">ツールを開く →</span>
      </a>

      <div class="tool soon">
        <div class="plus">＋</div>
        <span>新しいツールを準備中</span>
      </div>

    </div>
  </div>
</main>

<footer>
  <div class="wrap">
    各ツールはHTMLファイル1つで完結しており、入力したデータが外部に送信されることはありません。
  </div>
</footer>

</body>
</html>
