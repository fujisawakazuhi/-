<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日記</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Cpath d=%22M50 8 L92 42 V88 a4 4 0 0 1 -4 4 H62 V64 H38 V92 H12 a4 4 0 0 1 -4-4 V42 Z%22 fill=%22%230f6660%22/%3E%3C/svg%3E">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",Meiryo,sans-serif;
    background:#eef1f2;color:#17222c;line-height:1.6;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;
  }
  .card{
    background:#fff;border:1px solid #e2e7e9;border-radius:22px;
    padding:44px 40px;max-width:460px;width:100%;text-align:center;
    box-shadow:0 1px 2px rgba(15,40,38,.05),0 18px 44px -20px rgba(15,60,55,.25);
  }
  .emoji{font-size:2.4rem}
  h1{font-size:1.4rem;font-weight:800;margin-top:12px}
  p{margin-top:10px;font-size:.86rem;color:#63707b}
  a{
    display:inline-block;margin-top:22px;font-size:.86rem;font-weight:700;color:#fff;
    text-decoration:none;border-radius:999px;padding:10px 26px;
    background:linear-gradient(135deg,#17a294,#0f6660);
    box-shadow:0 8px 20px -8px rgba(15,102,96,.55);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="emoji">📓</div>
    <h1>日記</h1>
    <p>このセクションは準備中です。<br>コンテンツは順次追加していきます。</p>
    <a href="../">← ポータルにもどる</a>
  </div>
</body>
</html>
